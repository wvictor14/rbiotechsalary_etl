<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBiotech Salary Data Explorer</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    h1 { font-size: 2.5em; margin-bottom: 8px; }
    .subtitle { font-size: 1.1em; opacity: 0.9; }
    .controls {
      padding: 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    input, select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95em;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button {
      padding: 10px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95em;
      transition: background 0.2s;
    }
    button:hover { background: #5568d3; }
    .loading {
      padding: 40px;
      text-align: center;
      color: #666;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .results {
      padding: 20px;
      overflow-x: auto;
    }
    .results-header {
      margin-bottom: 16px;
      color: #666;
      font-size: 0.95em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    th {
      background: #f0f0f0;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #ddd;
      position: sticky;
      top: 0;
      white-space: nowrap;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    tr:hover { background: #f9f9f9; }
    .error {
      padding: 20px;
      background: #fee;
      color: #c33;
      border-radius: 4px;
      margin: 20px;
    }
    .empty {
      padding: 40px;
      text-align: center;
      color: #999;
    }
    footer {
      padding: 16px 20px;
      background: #f8f9fa;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>RBiotech Salary Data</h1>
      <p class="subtitle">Explore salary data across companies and roles</p>
    </header>

    <div class="controls">
      <select id="tableSelect">
        <option value="">Select a table...</option>
        <option value="fct_salaries">Salary Facts</option>
        <option value="dim_companies">Companies</option>
        <option value="dim_jobs">Job Titles</option>
        <option value="dim_locations">Locations</option>
      </select>
      <input type="number" id="limitInput" placeholder="Limit (default: 100)" min="1" max="10000">
      <button onclick="runQuery()">Query</button>
      <button onclick="clearResults()">Clear</button>
    </div>

    <div id="resultsContainer"></div>

    <footer>
      Updated monthly via dbt. Powered by CSV.
    </footer>
  </div>

  <script>
    async function runQuery() {
      const table = document.getElementById('tableSelect').value;
      const limit = parseInt(document.getElementById('limitInput').value) || 100;

      if (!table) {
        alert('Please select a table');
        return;
      }

      const container = document.getElementById('resultsContainer');
      container.innerHTML = '<div class="loading"><span class="spinner"></span> Loading data...</div>';

      try {
        const csvUrl = `./data/${table}.csv`;
        const response = await fetch(csvUrl);
        if (!response.ok) throw new Error(`Failed to load ${table}.csv`);

        const csv = await response.text();
        const result = Papa.parse(csv, { header: true, skipEmptyLines: true });

        if (result.errors.length > 0) {
          throw new Error(`CSV parse error: ${result.errors[0].message}`);
        }

        const rows = result.data.slice(0, limit);

        if (rows.length === 0) {
          container.innerHTML = '<div class="empty">No results found.</div>';
          return;
        }

        const columns = Object.keys(rows[0]);
        let html = `
          <div class="results">
            <div class="results-header">${rows.length} rows from <strong>${table}</strong></div>
            <table>
              <thead>
                <tr>
                  ${columns.map(col => `<th>${escapeHtml(col)}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${rows.map(row => `
                  <tr>
                    ${columns.map(col => {
                      let val = row[col];
                      if (!val) val = '—';
                      return `<td>${escapeHtml(String(val).substring(0, 100))}</td>`;
                    }).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;

        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error"><strong>Error:</strong> ${escapeHtml(err.message)}</div>`;
        console.error(err);
      }
    }

    function clearResults() {
      document.getElementById('resultsContainer').innerHTML = '';
      document.getElementById('tableSelect').value = '';
      document.getElementById('limitInput').value = '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Allow Enter to trigger query
    document.getElementById('limitInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') runQuery();
    });
  </script>
</body>
</html>
