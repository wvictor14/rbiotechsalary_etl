name: Publish parquet to GitHub Pages
on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install dbt-core dbt-duckdb duckdb

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          rbiotechsalary_etl:
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                schema: main
                threads: 4
            target: dev
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Run dbt build
        run: dbt build

      - name: Export to parquet
        run: python export_parquet.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
