version: 2

models:
  - name: responses
    description: >
      Final responses table containing enriched survey data. This table consolidates information
      about respondents, including their job titles, locations, and company details.

      See {{ doc('responses') }} for the overall strategy and details.
    columns:
      - name: response_id
        description: >
          Unique identifier for each survey response. This is a surrogate key generated
          from the `timestamp` column in the source data.
        tests:
          - relationships:
              arguments:
                to: ref('stg_responses')
                field: response_id

      - name: submitted_at
        data_type: timestamp
        description: "Submission timestamp from the raw Google Form"
        tests:
          - not_null

      - name: year
        data_type: integer
        description: "Year extracted from submitted_at"
        tests:
          - not_null

      - name: month
        data_type: integer
        description: "Month extracted from submitted_at"
        tests:
          - not_null

      - name: day
        data_type: integer
        description: "Day of month extracted from submitted_at"
        tests:
          - not_null

      - name: base_salary
        description: >
          Annual base salary as reported, cleaned and parsed to a number.

      - name: bonus_pct
        description: >
          Bonus as a fraction of base salary, where derivable. Nullable.

      - name: bonus_amount
        description: >
          Bonus amount in currency units. Derived from bonus_pct and base_salary when only one was reported. Nullable.

      - name: total_compensation
        description: >
          Base salary plus bonus amount, in the response's currency.

      - name: title
        description: >
          The raw job title provided by the respondent in the survey.

      - name: standardized_title
        description: >
          The cleaned and standardized version of the job title, mapped using the `job_hierarchy` seed.

      - name: department
        description: >
          The functional area or job group associated with the respondent's job title (raw_department from source).

      - name: job_function
        description: >
          The primary job function from the two-axis model (e.g., Data Scientist, Engineer, Analyst).

      - name: seniority
        description: >
          The seniority level from the two-axis model (e.g., Senior, Mid, Principal).
          Defaults to 'Mid' if job_function matched but no seniority match found.

      - name: seniority_rank
        description: >
          Numeric rank for seniority (1-14, higher = more senior).
          Defaults to 5 (Mid) if job_function matched but no seniority match found.

      - name: track
        description: >
          Career track from the two-axis model: IC (Individual Contributor), Management, Executive, or Training.
          Defaults to 'IC' if job_function matched but no seniority match found.
        tests:
          - accepted_values:
              values: ["IC", "Management", "Executive", "Training"]

      - name: title_status
        description: >
          Classification of title mapping success: 'missing' (null raw_job_title), 'unmatched' (no keyword matches),
          or 'matched' (at least one keyword matched).
        tests:
          - accepted_values:
              values: ["missing", "unmatched", "matched"]

      - name: location_name
        description: >
          Human-readable location label (e.g., 'Boston, Massachusetts, United States').

      - name: country
        description: >
          The country of the respondent, validated against the `countries` seed.

      - name: subdivision
        description: >
          The subdivision (e.g., US state or Canadian province) of the respondent. Null for other countries.

      - name: city
        description: >
          The city of the respondent, cleaned via the `city_names` seed. Null for entries that only specify state/province.

      - name: company_name
        description: >
          The cleaned and harmonized name of the respondent's company, mapped using the `company_names` seed.

      - name: company_size
        description: >
          The size of the respondent's company (e.g., Small, Medium, Large).

      - name: sector
        description: >
          The sector or industry of the respondent's company (e.g., Biotechnology, Pharmaceuticals).

      - name: company_is_private_or_public
        description: >
          Indicates whether the respondent's company is private or public.