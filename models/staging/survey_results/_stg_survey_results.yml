version: 2

models:
  - name: stg_responses
    description: >
      All survey years (2022-2026) mapped onto one canonical schema and
      unioned. Column semantics differ across survey revisions; see the
      per-year stg_responses_<year> models for the exact mappings. All
      values are varchar except response_id/survey_year/submitted_at; numeric parsing
      happens in intermediate models.
    columns:
      - name: response_id
        data_type: string
        description: "Surrogate key of (survey_year, submitted_at)"
        tests:
          - unique
          - not_null

      - name: survey_year
        data_type: integer
        description: "Which survey tab (year) the response came from"
        tests:
          - not_null
          - accepted_values:
              values: [2022, 2023, 2024, 2025, 2026]
              quote: false

      - name: submitted_at
        data_type: timestamp
        description: "Submission timestamp from the raw Google Form; unique within a year but not guaranteed across years"
        tests:
          - not_null

      - name: email_address
        data_type: string
        description: "2025 only"

      - name: raw_job_title
        data_type: string

      - name: raw_department
        data_type: string
        description: "2025+ only; older surveys did not ask for department"

      - name: position_description
        data_type: string

      - name: work_arrangement
        data_type: string
        description: "In-person / remote / hybrid; 2025+ only"

      - name: wfh_days_per_week
        data_type: string
        description: "2025+ only"

      - name: raw_country
        data_type: string

      - name: raw_city
        data_type: string
        description: "2025+: city question; 2022-2024: closest major city or hub"

      - name: raw_region
        data_type: string
        description: "2024 only: multi-state region buckets (e.g. 'New England (MA, CT, ...)')"

      - name: us_state
        data_type: string
        description: "2025+ only"

      - name: ca_province
        data_type: string
        description: "2025+ only"

      - name: raw_company_name
        data_type: string

      - name: company_is_private_or_public
        data_type: string

      - name: sector
        data_type: string

      - name: company_size
        data_type: string

      - name: company_review
        data_type: string

      - name: hours_worked_per_week
        data_type: string
        description: "2024+ only"

      - name: degrees
        data_type: string
        description: "2024-2025 multi-select degrees question"

      - name: highest_education
        data_type: string
        description: "2022-2023 and 2025+; phrasing changed across revisions"

      - name: postdoc_years
        data_type: string
        description: "2025+ only"

      - name: did_postdoc
        data_type: string
        description: "2022 only (yes/no)"

      - name: certifications
        data_type: string

      - name: years_of_experience
        data_type: string

      - name: years_at_current_position
        data_type: string
        description: "2025+ only"

      - name: currency
        data_type: string
        description: "2025+ only; older surveys assumed local currency"

      - name: salaried_or_hourly
        data_type: string
        description: "2025+ only"

      - name: hourly_hours_per_week
        data_type: string
        description: "2025+ only"

      - name: annual_base_salary
        data_type: string

      - name: overtime_pay
        data_type: string

      - name: annual_target_bonus_in_percentage
        data_type: string
        description: >
          Target bonus as a percent. Native for 2025+; for 2022-2024 derived
          from the mixed-unit bonus column when the value was <= 100
          (values <= 1 treated as decimal fractions and scaled by 100).

      - name: annual_target_bonus_amount
        data_type: string
        description: >
          Target bonus in dollars. 2022-2024 only, from the mixed-unit bonus
          column when the value was > 100.

      - name: other_annual_bonus
        data_type: string
        description: "2025+ only"

      - name: bonus_received_last_cycle
        data_type: string
        description: "2025+ only"

      - name: commission
        data_type: string
        description: "2025+ only"

      - name: annual_equity
        data_type: string

      - name: most_recent_annual_yearly_raise
        data_type: string

      - name: signon_bonus_value
        data_type: string

      - name: signon_stock_options
        data_type: string

      - name: relocation_assistance_value
        data_type: string

      - name: retirement_benefits
        data_type: string

      - name: retirement_percent_match
        data_type: string
        description: "2024 only"

      - name: healthcare_benefits
        data_type: string

      - name: survey_feedback
        data_type: string
        description: "2024+ only"
