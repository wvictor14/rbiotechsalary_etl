version: 2

seeds:
  - name: job_hierarchy
    description: >
      This seed file contains the mapping of raw job titles to standardized titles, along with their associated departments, hierarchies, and priority rankings. 
      The `keyword` column is used for matching against raw job titles in the source data, while `standardized_title`, `department`, and `hierarchy` provide the necessary information for categorizing and analyzing job positions.
    columns:
      - name: keyword
        description: "The keyword used for matching against raw job titles. This should be a lowercased version of the job title or a relevant substring."
      - name: standardized_title
        description: "The standardized job title that corresponds to the keyword. This is the official title assigned based on the highest-priority keyword match."
      - name: department
        description: "The functional area or job group associated with the response (e.g., Research, Operations, Commercial)."
      - name: hierarchy
        description: >
          The categorical level of the job title, which can be used for hierarchical analysis.
          Possible values include: C-Suite/Executive, Senior Management, Middle Management,
          Senior Individual Contributor, Scientific/Technical Professional, Associate/Assistant, Entry Level/Training, Specialized Role, Other.
      - name: priority
        description: >
          The ranking value used to resolve overlapping matches when a raw job title contains multiple keywords.
          A lower number indicates a higher priority (e.g., 1 is the highest priority). This allows for consistent assignment of standardized titles when multiple matches are possible.

  - name: city_names
    description: >
      Mapping of raw city names to cleaned/standardized city names.
      Handles typos, diacritics, embedded info, and non-city values.
    columns:
      - name: raw_city
        description: "The original city value as it appears in the survey data."
      - name: clean_city
        description: "The standardized city name. Empty/null means the value should be treated as no city."
  - name: currency_names
    description: >
      Mapping of raw free-text currency answers (2025+ surveys) to ISO 4217
      currency codes. Join key is lowercased and trimmed.
    columns:
      - name: raw_currency
        description: "Lowercased raw currency answer as it appears in the survey data."
      - name: currency_code
        description: "ISO 4217 currency code (USD, CAD, EUR, ...)."

  - name: country_names
    description: >
      Mapping of raw country name variants (USA, US, u.s.a., England, ...) to
      standardized country names matching the countries seed. Join key is
      lowercased and trimmed.
    columns:
      - name: raw_country
        description: "Lowercased raw country value as it appears in the survey data."
      - name: clean_country
        description: "Standardized country name, matches countries.country."

  - name: country_currencies
    description: >
      Standard currency for each country, used to infer response currency for
      survey years (pre-2025) that did not ask which currency answers were in.
    columns:
      - name: country
        description: "Standardized country name, matches countries.country."
      - name: currency_code
        description: "ISO 4217 currency code of the country's primary currency."

  - name: region_countries
    description: >
      Mapping of the 2024 survey's region buckets (e.g. "New England (MA, CT,
      RI, NH, VT, ME)") to a country and currency. Country is empty for
      ambiguous multi-country regions (EU, Benelux) where only the currency is
      determinable. Join key is lowercased and trimmed.
    columns:
      - name: raw_region
        description: "Lowercased raw region value as it appears in the 2024 survey."
      - name: country
        description: "Standardized country name; empty when the region spans countries."
      - name: currency_code
        description: "ISO 4217 currency code implied by the region."
