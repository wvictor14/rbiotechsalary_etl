version: 2

seeds:
  - name: job_functions
    description: >
      Seed file mapping keywords to job functions in the two-axis job classification model.
      Keywords are matched against job titles using word-boundary fuzzy matching (exact, starts-with, ends-with, surrounded-by-spaces).
      Lower priority values indicate higher priority; longest keyword wins ties.
    columns:
      - name: keyword
        description: "The keyword to match against normalized job titles. Lowercase, no punctuation."
      - name: job_function
        description: "The primary job function (e.g., Data Scientist, Engineer, Analyst)."
      - name: priority
        description: "Priority for resolving multiple matches (lower = higher priority). Longest keyword breaks ties."

  - name: seniority_levels
    description: >
      Seed file mapping keywords to seniority levels, track, and rank in the two-axis job classification model.
      Keywords are matched against job titles using word-boundary fuzzy matching (exact, starts-with, ends-with, surrounded-by-spaces).
      Lower priority values indicate higher priority; longest keyword wins ties.
    columns:
      - name: keyword
        description: "The keyword to match against normalized job titles. Lowercase, no punctuation."
      - name: seniority
        description: "The seniority level (e.g., Mid, Senior, Principal, Manager)."
      - name: track
        description: "The career track (IC = Individual Contributor, Management, Executive, or Training)."
      - name: seniority_rank
        description: "Numeric rank for seniority level (1-14, higher = more senior). Used for ordering."
      - name: priority
        description: "Priority for resolving multiple matches (lower = higher priority). Longest keyword breaks ties."

  - name: city_names
    description: >
      Mapping of raw city names to cleaned/standardized city names.
      Handles typos, diacritics, embedded info, and non-city values.
    columns:
      - name: raw_city
        description: "The original city value as it appears in the survey data."
      - name: clean_city
        description: "The standardized city name. Empty/null means the value should be treated as no city."
  - name: currency_names
    description: >
      Mapping of raw free-text currency answers (2025+ surveys) to ISO 4217
      currency codes. Join key is lowercased and trimmed.
    columns:
      - name: raw_currency
        description: "Lowercased raw currency answer as it appears in the survey data."
      - name: currency_code
        description: "ISO 4217 currency code (USD, CAD, EUR, ...)."

  - name: country_names
    description: >
      Mapping of raw country name variants (USA, US, u.s.a., England, ...) to
      standardized country names matching the countries seed. Join key is
      lowercased and trimmed.
    columns:
      - name: raw_country
        description: "Lowercased raw country value as it appears in the survey data."
      - name: clean_country
        description: "Standardized country name, matches countries.country."

  - name: country_currencies
    description: >
      Standard currency for each country, used to infer response currency for
      survey years (pre-2025) that did not ask which currency answers were in.
    columns:
      - name: country
        description: "Standardized country name, matches countries.country."
      - name: currency_code
        description: "ISO 4217 currency code of the country's primary currency."

  - name: region_countries
    description: >
      Mapping of the 2024 survey's region buckets (e.g. "New England (MA, CT,
      RI, NH, VT, ME)") to a country and currency. Country is empty for
      ambiguous multi-country regions (EU, Benelux) where only the currency is
      determinable. Join key is lowercased and trimmed.
    columns:
      - name: raw_region
        description: "Lowercased raw region value as it appears in the 2024 survey."
      - name: country
        description: "Standardized country name; empty when the region spans countries."
      - name: currency_code
        description: "ISO 4217 currency code implied by the region."
